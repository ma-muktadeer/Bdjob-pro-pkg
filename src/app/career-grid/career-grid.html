<div class="max-w-7xl mx-auto p-6 bg-[#FCFCFD]">

    <div class="mb-10">
        <p class="text-base font-medium text-[#667085]">Explore what each feature offers</p>
        <h2 class="text-4xl font-semibold tracking-[-0.72px] leading-[44px] text-[#101828]">How Bdjobs Pro Simplifies
            Your Career Journey</h2>
    </div>

    <!-- Grid Container -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12 auto-rows-fr">
        @for (card of features; track card.title) {
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm flex flex-col transition-all hover:shadow-lg overflow-hidden"
            [class.lg:col-span-2]="card.size === 'wide'" [class.lg:row-span-2]="card.size === 'tall'">

            <!-- Graphic/Mockup Section -->
            <!-- Tall card hole ekhane height beshi thakbe -->
            <div class="bg-[#F9FAFB] m-[6px] flex items-center justify-center relative overflow-hidden"
                [class.flex-grow]="card.size === 'tall'" [class.h-48]="card.size !== 'tall'">
                @if(card?.img){
                <div class="w-full h-full rounded-[8px] bg-gray-200 bg-cover bg-center bg-no-repeat"
                    [style.backgroundImage]="'url(' + card.img + ')'">
                </div>
                }@else{
                <div
                    class="w-full h-full bg-white rounded-xl shadow-sm border border-gray-50 p-4 transform translate-y-4">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 rounded-full bg-blue-100"></div>
                        <div class="space-y-1">
                            <div class="w-20 h-2 bg-gray-100 rounded"></div>
                            <div class="w-12 h-1.5 bg-gray-50 rounded"></div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="w-full h-2 bg-gray-50 rounded"></div>
                        <div class="w-3/4 h-2 bg-gray-50 rounded"></div>
                    </div>
                </div>
                }
            </div>
            <div class="p-[20px] bg-white">
                <div class="flex flex-col gap-2">
                    <!-- text-2xl font-semibold text-[#101828] -->
                    <h3 class="text-2xl font-semibold text-[#101828]">{{ card.title }}</h3>
                    <!-- text-base font-medium text-[#475467] -->
                    <p class="text-base font-medium text-[#475467]">{{ card.desc }}</p>
                </div>
            </div>
        </div>
        }
    </div>
</div>
