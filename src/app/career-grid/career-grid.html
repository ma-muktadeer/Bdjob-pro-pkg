<div class="max-w-7xl mx-auto p-6 bg-[#FCFCFD]">

    <div class="mb-10">
        <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">Explore what each feature offers</p>
        <h2 class="text-3xl font-bold text-[#101828]">How Bdjobs Pro Simplifies Your Career Journey</h2>
    </div>

    <!-- Grid Container -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-fr">
        @for (card of features; track card.title) {
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm flex flex-col transition-all hover:shadow-lg overflow-hidden"
            [class.lg:col-span-2]="card.size === 'wide'" [class.lg:row-span-2]="card.size === 'tall'">

            <!-- Graphic/Mockup Section -->
            <!-- Tall card hole ekhane height beshi thakbe -->
            <div class="bg-[#F9FAFB] p-6 flex items-center justify-center relative overflow-hidden"
                [class.flex-grow]="card.size === 'tall'" [class.h-48]="card.size !== 'tall'">

                <!-- Example Mockup Graphics -->
                <div
                    class="w-full h-full bg-white rounded-xl shadow-sm border border-gray-50 p-4 transform translate-y-4">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 rounded-full bg-blue-100"></div>
                        <div class="space-y-1">
                            <div class="w-20 h-2 bg-gray-100 rounded"></div>
                            <div class="w-12 h-1.5 bg-gray-50 rounded"></div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="w-full h-2 bg-gray-50 rounded"></div>
                        <div class="w-3/4 h-2 bg-gray-50 rounded"></div>
                    </div>
                </div>
            </div>

            <!-- Text Content Section -->
            <div class="p-6 bg-white">
                <h3 class="text-lg font-bold text-[#101828] mb-2">{{ card.title }}</h3>
                <p class="text-sm text-gray-500 leading-relaxed">{{ card.desc }}</p>
            </div>
        </div>
        }
    </div>
</div>
